<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Horas de Implantação</title>

<style>

:root{
  --bg1:#ece6f3;
  --bg2:#dcd2ea;

  --card:#ffffff;
  --text:#3a235a;
  --muted:#6f5a8f;

  --accent:#7b4dff;
  --accent2:#5a3bd6;

  --success:#22c55e;

  --border:#e6def3;
  --radius:16px;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;

background:linear-gradient(180deg,var(--bg1),var(--bg2));

color:var(--text);

min-height:100vh;

padding:40px 16px;
}

.wrap{
max-width:900px;
margin:auto;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.logoWrap{
display:flex;
align-items:center;
gap:14px;
}

.logo{
height:40px;
}

.title{
margin:0;
font-size:26px;
font-weight:700;
}

.subtitle{
margin-top:4px;
color:var(--muted);
font-size:14px;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:22px;

box-shadow:
0 10px 25px rgba(0,0,0,0.05);

border:1px solid var(--border);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:12px;
}

@media(max-width:720px){
.grid{
grid-template-columns:1fr;
}
}

.field label{
display:block;
font-size:13px;
margin-bottom:6px;
color:var(--muted);
}

select{
width:100%;

padding:12px;

border-radius:12px;

border:1px solid var(--border);

background:#faf9fd;

font-size:14px;

color:var(--text);
}

select option{
background:white;
color:black;
}

.resultBox{

margin-top:18px;

background:#faf9fd;

border-radius:14px;

padding:16px;

border:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

gap:12px;
}

.resultado{
font-size:18px;
font-weight:700;
}

.actions{
display:flex;
gap:10px;
}

.btn{

border:none;

border-radius:14px;

padding:10px 16px;

font-weight:600;

cursor:pointer;

font-size:14px;

transition:0.2s;
}

.btnPrimary{

background:linear-gradient(90deg,var(--accent),var(--accent2));

color:white;
}

.btnPrimary:hover{

transform:translateY(-1px);

box-shadow:0 6px 14px rgba(123,77,255,0.35);
}

.btnSecondary{

background:#eef0ff;

color:#5a3bd6;
}

.btnSecondary:hover{

background:#e0e5ff;
}

.footer{
text-align:center;
margin-top:30px;
font-size:12px;
color:#7a6b96;
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">

<div class="logoWrap">

<img src="assets/logo-centric.png" class="logo" alt="Centric">

<div>
<h1 class="title">Consulta de Horas de Implantação</h1>
<p class="subtitle">
Selecione o produto e a edição para ver o esforço estimado e acessar o escopo correspondente.
</p>
</div>

</div>

<div class="pill">⏱️ Portal interno • Escopos</div>

</div>

<div class="card">

<div class="grid">

<div class="field">
<label for="produto">Produto</label>
<div class="selectWrap">
<select id="produto">
<option value="">Selecione</option>
</select>
</div>
</div>

<div class="field">
<label for="edicao">Edição</label>
<div class="selectWrap">
<select id="edicao" disabled>
<option value="">Selecione</option>
</select>
</div>
</div>

</div>

<div class="resultBox">

<div>
<div class="resultado" id="resultado">
Selecione um produto e uma edição.
</div>
</div>

<div class="actions">

<a id="linkEscopo" class="btn btnPrimary" target="_blank" rel="noopener" style="display:none;">
📄 Abrir escopo
</a>

<button id="btnLimpar" class="btn" type="button">
↺ Limpar
</button>

</div>

</div>

</div>

<div class="footer">
Centric • ManageEngine • Portal de horas de implantação
</div>

</div>

<script src="dados.js?v=20260218-3"></script>
<script src="app.js?v=20260218-3"></script>

<script>

document.getElementById("btnLimpar").addEventListener("click", () => {

const produto=document.getElementById("produto");
const edicao=document.getElementById("edicao");
const resultado=document.getElementById("resultado");
const link=document.getElementById("linkEscopo");

produto.value="";
edicao.innerHTML='<option value="">Selecione</option>';
edicao.disabled=true;

resultado.textContent="Selecione um produto e uma edição.";

link.style.display="none";
link.removeAttribute("href");

produto.dispatchEvent(new Event("change"));

});

</script>

</body>
</html>
